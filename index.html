<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    body 
    {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, navy, cyan); /* Deep blue to cyan */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box 
    {
      background-color: rgba(0, 0, 128, 0.8); /* semi-transparent navy */
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px black;
      width: 320px;
    }

    .login-box h2 
    {
      text-align: center;
      margin-bottom: 20px;
      color: white;
    }

    input[type="text"],
    input[type="password"] 
    {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background-color: lightblue;
      color: black;
      font-size: 16px;
    }

    input::placeholder 
    {
      color: black;
    }

    button 
    {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, cyan, blue); /* cyan to blue */
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      transition: background 0.3s ease;
    }

    button:hover 
    {
      background: linear-gradient(to right, aqua, darkblue); /* hover effect */
      color: black;
    }

    #message 
    {
      margin-top: 10px;
      text-align: center;
      color: lightcoral;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>
    <form onsubmit="return checkLogin()">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
      <p id="message"></p>
    </form>
  </div>

  <script>
    function checkLogin() 
    {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      const message = document.getElementById("message");

      if (user === "user" && pass === "user") {
        message.style.color = "lightgreen";
        message.textContent = "Login successful!";
        // Redirect to store page after a short delay
        setTimeout(() => 
        {
          window.location.href = "store.html"; // Redirect to store page
        }, 2000); // 5 second delay
      }
    else 
      {
        message.style.color = "lightcoral";
        message.textContent = "Invalid username or password.";
      }

      return false;
    }
  </script>

</body>
</html>
